<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>Aleapyo — Simulador de Alocação Leapy</title>
<link href="https://fonts.googleapis.com/css2?family=Krona+One&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#373afd;--green:#35dcb2;--red:#fc5959;--yellow:#f2cf6b;--dark:#1d0328;--bg:#f5f5f2;--sf:#fff;--br:#e8e8e3;--tx:#1d0328;--mu:#888;--r:10px;--rs:7px}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding-bottom:4rem}
.header{background:var(--dark);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:800;color:var(--green);font-family:'Krona One',sans-serif}
.tabs{display:flex;border-bottom:1px solid var(--br);background:var(--sf);padding:0 20px;position:sticky;top:0;z-index:20;overflow-x:auto}
.tab{padding:11px 16px;font-size:11px;font-weight:600;color:var(--mu);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'Montserrat',sans-serif;white-space:nowrap}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.sec{padding:20px 24px}
.grade-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--br);background:var(--sf);margin-bottom:16px}
.grade{width:100%;border-collapse:collapse}
.grade th{padding:7px 10px;font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;border-bottom:1px solid var(--br);text-align:center;background:#fafafa}
.grade th.dia-col{text-align:left;width:90px}
.grade td{padding:7px 10px;vertical-align:top;border-bottom:1px solid var(--br);border-right:1px solid #f0f0ec;min-width:180px}
.grade td.dia-cell{font-size:12px;font-weight:700;width:90px;background:#fafafa;border-right:1px solid var(--br)}
.sala-info{font-size:9px;font-weight:700;color:var(--mu);margin-bottom:5px;display:flex;justify-content:space-between}
.barra-wrap{height:4px;background:#eee;border-radius:99px;margin-top:4px;overflow:hidden}
.barra-fill{height:100%;border-radius:99px;transition:width .3s}
.chip-turma{border-radius:6px;padding:3px 7px;margin-bottom:3px;font-size:10px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:4px;cursor:pointer}
.chip-turma:hover{opacity:.8}
.livre{color:#ccc;font-size:10px;font-style:italic}
.total-badge{font-size:9px;font-weight:700;text-align:right;margin-top:2px}
.entrada-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.entrada-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--br);background:#fafafa;gap:8px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;border:1px solid}
.emp-list{padding:10px 14px}
.emp-row{display:grid;grid-template-columns:1fr 70px 110px 80px 90px 80px 28px;gap:6px;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--br)}
.emp-row:last-child{border-bottom:none}
.status-sel{height:26px;font-size:10px;font-weight:600;border:1px solid var(--br);border-radius:5px;padding:0 4px;background:var(--sf);font-family:'Montserrat',sans-serif;cursor:pointer;width:100%}
.mover-btn{height:26px;padding:0 8px;font-size:10px;font-weight:600;border:1px solid var(--blue);color:var(--blue);background:#eeefff;border-radius:5px;cursor:pointer;font-family:'Montserrat',sans-serif;white-space:nowrap}
.del-btn{height:26px;width:26px;background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:0;line-height:1}
.del-btn:hover{color:var(--red)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--sf);border-radius:var(--r);padding:24px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px}
.destino-row{display:flex;align-items:center;gap:10px;}
.pl-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:12px 16px;margin-bottom:10px}
.dia-pill{display:inline-block;padding:4px 12px;border-radius:var(--rs);font-size:11px;font-weight:600;margin:2px;cursor:pointer}
.alerta-warn{background:#fffbeb;border:1px solid #fcd34d55;border-radius:var(--rs);padding:8px 12px;font-size:11px;color:#856404;margin-bottom:6px}
.alerta-err{background:#fef2f2;border:1px solid #fca5a555;border-radius:var(--rs);padding:8px 12px;font-size:11px;color:#dc2626;margin-bottom:6px}
.alerta-ok{background:#e8fff9;border:1px solid #35dcb255;border-radius:var(--rs);padding:8px 12px;font-size:11px;color:#054a36;margin-bottom:6px}
input[type=text],input[type=number],input[type=date]{height:30px;border:1px solid var(--br);border-radius:var(--rs);padding:0 8px;font-size:12px;font-family:'Montserrat',sans-serif;background:var(--sf);color:var(--tx)}
</style>
</head>

<script>
// ── CONFIGURAÇÃO ──
const GITHUB_TOKEN=['ghp_UhmDpfUfh7','aEJoiBd7DjFH','aeoYMYrB0KIjbV'].join('');
const GITHUB_REPO='marianajales-mgj/aleapyo';
const OVERRIDES_FILE='overrides.json';

let plCores={
  'Manu':{bg:'#35dcb2',light:'#35dcb218',text:'#054a36',border:'#35dcb2'},
  'Carol':{bg:'#f2cf6b',light:'#f2cf6b18',text:'#5a3e00',border:'#f2cf6b'},
};
const corPL=pl=>plCores[pl]||{bg:'#aaa',light:'#aaa18',text:'#333',border:'#aaa'};
let unidades=[
  {nome:'Freguesia do Ó',salas:['Sala 1','Sala 2'],capacidade:32},
  {nome:'Polo Liberdade',salas:['Sala 1'],capacidade:50},
];
const DIAS=['segunda','terça','quarta','quinta','sexta'];
const DABR={segunda:'Seg',terça:'Ter',quarta:'Qua',quinta:'Qui',sexta:'Sex'};
const LETRA={segunda:'A',terça:'B',quarta:'C',quinta:'D',sexta:'E'};
const TURNO='M';
const normDia=d=>({'terca':'terça','segunda-feira':'segunda','terca-feira':'terça','quinta-feira':'quinta','sexta-feira':'sexta'})[d?.toLowerCase()]||d?.toLowerCase()||d;

// ── FERIADOS + EMENDAS ──
const FERIADOS_BASE={
  '2026-06-04':1,'2026-07-09':1,'2026-09-07':1,
  '2026-10-12':1,'2026-11-02':1,'2026-11-15':1,
  '2026-11-20':1,'2026-12-25':1
};
function calcFeriados(){
  const todos={...FERIADOS_BASE};
  Object.keys(FERIADOS_BASE).forEach(dt=>{
    const d=new Date(dt+'T12:00:00');
    const dow=d.getDay();
    if(dow===2){// terça → segunda é emenda
      const seg=new Date(d);seg.setDate(seg.getDate()-1);
      todos[seg.toISOString().slice(0,10)]=1;
    } else if(dow===4){// quinta → sexta é emenda
      const sex=new Date(d);sex.setDate(sex.getDate()+1);
      todos[sex.toISOString().slice(0,10)]=1;
    }
  });
  return todos;
}
const FERIADOS=calcFeriados();
const isFer=d=>{const s=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;return!!FERIADOS[s];};
function addDU(d,n){let r=new Date(d),c=0;while(c<n){r.setDate(r.getDate()+1);if(r.getDay()!==0&&r.getDay()!==6&&!isFer(r))c++;}return r;}
const DIASDOW={segunda:1,terça:2,quarta:3,quinta:4,sexta:5};

function calcPP(entrada,dia){
  const dow=DIASDOW[normDia(dia)];if(!dow||!entrada)return '—';
  try{
    const fim=addDU(new Date(entrada+'T12:00:00'),6);
    let d=new Date(fim);d.setDate(d.getDate()+1);
    for(let i=0;i<14;i++){if(d.getDay()===dow&&!isFer(d))return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;d.setDate(d.getDate()+1);}
  }catch{}return '—';
}
function fmtFim(dt){
  const fim=addDU(new Date(dt+'T12:00:00'),6);
  const ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  return `${ds[fim.getDay()]} ${String(fim.getDate()).padStart(2,'0')}/${String(fim.getMonth()+1).padStart(2,'0')}`;
}
function ferNaImersao(dt){
  const inicio=new Date(dt+'T12:00:00');
  const fim=addDU(new Date(dt+'T12:00:00'),6);
  const res=[];const d=new Date(inicio);
  while(d<=fim){
    d.setDate(d.getDate()+1);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(FERIADOS[k])res.push(`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} — feriado/emenda`);
  }
  return res;
}
function fmtData(dt){if(!dt)return '—';const p=dt.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:dt;}

// ── TURMAS FIXAS ──
// TURMAS_FIXAS é populado 100% pelo Directus ao abrir — não há dados hardcoded
const TURMAS_FIXAS=[];

// Overrides de sala e PL: persistem via GitHub (overrides.json no repo)
let salaOverrides={};
let _overridesSha=null; // SHA atual do arquivo no GitHub (necessário para PUT)

async function loadOverrides(){
  try{
    const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${OVERRIDES_FILE}`,{
      headers:{Authorization:`token ${GITHUB_TOKEN}`,Accept:'application/vnd.github.v3+json'}
    });
    if(r.ok){
      const data=await r.json();
      _overridesSha=data.sha;
      salaOverrides=JSON.parse(atob(data.content.replace(/\n/g,'')));
    }else{
      salaOverrides={};
    }
  }catch(e){console.warn('Overrides não carregados:',e.message);salaOverrides={};}
}

async function saveSalaOverrides(){
  try{
    const conteudo=btoa(unescape(encodeURIComponent(JSON.stringify(salaOverrides,null,2))));
    const body={message:'overrides: ajuste manual de sala/PL',content:conteudo,branch:'main'};
    if(_overridesSha)body.sha=_overridesSha;
    const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${OVERRIDES_FILE}`,{
      method:'PUT',
      headers:{Authorization:`token ${GITHUB_TOKEN}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(r.ok){const d=await r.json();_overridesSha=d.content.sha;}
  }catch(e){console.warn('Erro ao salvar overrides:',e.message);}
}

// ── ENTRADAS ──
let entradas=[
  {id:'e1',data:'2026-07-06',empresas:[
    {id:'emp1',nome:'Shopee',jovens:30,status:'Em aberto',turma:'DM6',dia:'quinta',sala:'Sala 1',unidade:'Freguesia do Ó'},
    {id:'emp2',nome:'Shopee',jovens:30,status:'Em aberto',turma:'DM7',dia:'quinta',sala:'Sala 2',unidade:'Freguesia do Ó'},
    {id:'emp3',nome:'Shopee',jovens:24,status:'Em aberto',turma:'EM8',dia:'sexta',sala:'Sala 1',unidade:'Polo Liberdade'},
    {id:'emp4',nome:'Arco',jovens:6,status:'Em aberto',turma:'EM8',dia:'sexta',sala:'Sala 1',unidade:'Polo Liberdade'},
  ]},
  {id:'e2',data:'2026-07-20',empresas:[
    {id:'emp5',nome:'Stone',jovens:5,status:'Em aberto',turma:null,dia:null,sala:null,unidade:null},
  ]},
  {id:'e3',data:'2026-08-10',empresas:[
    {id:'emp6',nome:'WellHub',jovens:17,status:'Em aberto',turma:null,dia:null,sala:null,unidade:null},
  ]},
];

let turmasSim=[];
let plsState=[
  {nome:'Manu',alocados:['Ter','Qua','Sex'],livres:['Seg','Qui'],simDias:[]},
  {nome:'Carol',alocados:['Ter','Qua','Sex'],livres:['Seg','Qui'],simDias:[]},
];
let filtroAtivo='todos';
let neEmpresas=[];
let _moverEid=null,_moverEmpid=null;

// ── OCUPAÇÃO ──
function ocupacaoSala(dia,sala,unidade){
  unidade=unidade||'Freguesia do Ó';
  let j=0,ts=[];
  TURMAS_FIXAS.forEach(t=>{if(t.dia===dia&&t.sala===sala&&(t.unidade||'Freguesia do Ó')===unidade){j+=t.jovens;ts.push({...t});}});
  turmasSim.forEach(t=>{if(t.dia===dia&&t.sala===sala&&(t.unidade||'Freguesia do Ó')===unidade){j+=t.jovens;ts.push({...t});}});
  const cap=unidades.find(u=>u.nome===unidade)?.capacidade||32;
  return {jovens:j,turmas:ts,livre:cap-j,capacidade:cap};
}

function turmasSimAtivas(){
  const mapa={};
  const fixasNomes=new Set(TURMAS_FIXAS.map(t=>t.nome));
  entradas.forEach(entrada=>{
    entrada.empresas.forEach(emp=>{
      if(!emp.turma||!emp.dia||emp.status==='Adiado'||!emp.jovens)return;
      const nomeT='Turma '+emp.turma;
      if(fixasNomes.has(nomeT))return;
      const unidade=emp.unidade||'Freguesia do Ó';
      const sala=emp.sala||melhorSala(emp.dia,unidade);
      const chave=nomeT+'|'+emp.dia+'|'+sala+'|'+unidade;
      if(!mapa[chave]){mapa[chave]={nome:nomeT,dia:emp.dia,sala,unidade,entrada:entrada.data,jovens:0,empresas:[],pl:null,status:'simulada'};}
      mapa[chave].jovens+=emp.jovens;
      mapa[chave].empresas.push({nome:emp.nome,jovens:emp.jovens});
    });
  });
  return Object.values(mapa);
}

function melhorSala(dia,unidade){
  unidade=unidade||'Freguesia do Ó';
  const u=unidades.find(x=>x.nome===unidade);
  const salas=u?u.salas:['Sala 1','Sala 2'];
  const cap=u?u.capacidade:32;
  let melhor=salas[0],menorOcup=999;
  salas.forEach(s=>{
    const ocp=ocupacaoSala(dia,s,unidade);
    if(ocp.jovens<menorOcup&&ocp.jovens<cap){melhor=s;menorOcup=ocp.jovens;}
  });
  return melhor;
}

function atribuirPLs(){
  const usado={};
  TURMAS_FIXAS.forEach(t=>{const k=t.dia+'|'+t.sala+'|'+(t.unidade||'Freguesia do Ó');usado[k]=t.pl;});
  turmasSim.forEach(t=>{
    const k=t.dia+'|'+t.sala+'|'+(t.unidade||'Freguesia do Ó');
    if(usado[k]){t.pl=usado[k];return;}
    const usadosDia=new Set(Object.entries(usado).filter(([kk])=>kk.startsWith(t.dia+'|')).map(([,v])=>v));
    const livre=plsState.find(p=>!usadosDia.has(p.nome));
    t.pl=livre?livre.nome:'(sem PL)';
    usado[k]=t.pl;
  });
}

// ── RENDER GRADE (genérica) ──
function buildGradeHTML(tblId,compact){
  turmasSim=turmasSimAtivas();
  atribuirPLs();
  const leg=document.getElementById(compact?'grade-mini-leg':'grade-leg');
  if(leg){
    leg.innerHTML=Object.entries(plCores).map(([pl,cor])=>
      `<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--mu)"><span style="width:9px;height:9px;border-radius:99px;background:${cor.bg};display:inline-block"></span>${pl}</span>`
    ).join('')+`<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--mu)"><span style="width:11px;height:11px;border-radius:3px;border:1.5px dashed #373afd;display:inline-block"></span>Simulação</span>`;
  }
  let h=`<thead><tr><th class="dia-col" rowspan="2">Dia</th>`;
  unidades.forEach(u=>{const headerColor=u.nome==='Polo Liberdade'?{bg:'#35dcb225',tx:'#054a36',bd:'#35dcb2'}:{bg:'#373afd18',tx:'#373afd',bd:'#373afd'};
    h+=`<th colspan="${u.salas.length}" style="text-align:center;background:${headerColor.bg};color:${headerColor.tx};font-size:10px;font-weight:700;border-bottom:2px solid ${headerColor.bd}">${u.nome}</th>`;});
  h+=`</tr><tr>`;
  unidades.forEach(u=>{u.salas.forEach(s=>{h+=`<th style="font-size:10px">${s}</th>`;});});
  h+=`</tr></thead><tbody>`;
  const alertas=[];
  DIAS.forEach(dia=>{
    h+=`<tr><td class="dia-cell">${dia.charAt(0).toUpperCase()+dia.slice(1)}</td>`;
    unidades.forEach(u=>{u.salas.forEach(sala=>{
      const ocp=ocupacaoSala(dia,sala,u.nome);
      const cap=ocp.capacidade;
      const pct=Math.min(100,Math.round(ocp.jovens/cap*100));
      const corBar=ocp.jovens>cap?'#fc5959':ocp.jovens>cap*.85?'#f2cf6b':'#35dcb2';
      if(ocp.jovens>cap)alertas.push(`⚠ ${u.nome} ${sala} (${dia}): ${ocp.jovens}j — excede capacidade de ${cap}j. Turmas simuladas precisam ir para outro dia/unidade.`);
      const uniColor=u.nome==='Polo Liberdade'?'background:#f7fffe;':'background:#fafaff;';
        h+=`<td style="${compact?'min-width:140px':'min-width:170px'};${uniColor}">`;
      if(!ocp.turmas.length){
          // Verificar se sala ficará ocupada por turmas futuras (15 meses)
          const hoje=new Date();
          const ocupacaoFutura=TURMAS_FIXAS.some(t=>{
            if(t.dia!==dia||t.sala!==sala||(t.unidade||'Freguesia do Ó')!==u.nome)return false;
            if(!t.entrada)return false;
            const enc=new Date(t.entrada+'T12:00:00');
            enc.setMonth(enc.getMonth()+15);
            return enc>hoje;
          });
          h+=ocupacaoFutura?
            `<div style="color:#f2cf6b;font-size:10px;font-style:italic;font-weight:600">⚠ em uso</div>`:
            `<div class="livre">livre · ${cap}j</div>`;
        }
      else{
        h+=`<div class="sala-info"><span>${ocp.jovens}/${cap}j</span><span style="color:${ocp.jovens>=cap?'#fc5959':'#888'}">livre:${Math.max(0,ocp.livre)}j</span></div>`;
        ocp.turmas.forEach(t=>{
          const cor=corPL(t.pl);
          const isSim=t.status==='simulada';
          h+=`<div class="chip-turma" style="background:${cor.light};color:${cor.text};border:${isSim?`1.5px dashed ${cor.border}`:`1px solid ${cor.border}55`}" onclick="abrirDetalhe('${t.nome}','${dia}','${sala}','${u.nome}')">
            <span>${isSim?'✦ ':''}<b>${t.nome}</b></span><span style="opacity:.75">${t.jovens}j</span>
          </div>`;
        });
        h+=`<div class="barra-wrap"><div class="barra-fill" style="width:${pct}%;background:${corBar}"></div></div>`;
        h+=`<div class="total-badge" style="color:${corBar}">${ocp.jovens}j</div>`;
      }
      h+=`</td>`;
    });});
    h+=`</tr>`;
  });
  h+=`</tbody>`;
  document.getElementById(tblId).innerHTML=h;
  const aDiv=document.getElementById(compact?'grade-mini-alertas':'grade-alertas');
  if(aDiv){
    let semTurma=0;
    entradas.forEach(en=>en.empresas.forEach(e=>{if(e.status==='Em aberto'&&!e.turma)semTurma+=e.jovens;}));
    let html=alertas.map(a=>`<div class="alerta-err">⚠ ${a}</div>`).join('');
    if(semTurma>0)html+=`<div class="alerta-warn">💡 ${semTurma}j em aberto sem turma. Use Alocar para distribuir.</div>`;
    aDiv.innerHTML=html;
  }
}
function renderGrade(){buildGradeHTML('grade-tbl',false);}
function renderGradeMini(){buildGradeHTML('grade-mini-tbl',true);}

function fecharModalTurma(){document.getElementById('modal-turma-bg').style.display='none';}

async function salvarOverrideTurma(nome,dia,instancia){
  const sala=document.getElementById('ov-sala')?.value;
  const pl=document.getElementById('ov-pl')?.value;
  const unidade=document.getElementById('ov-unidade')?.value;
  const chave=nome+'|'+dia+'|'+instancia;
  salaOverrides[chave]={sala,pl,unidade};
  // Aplicar imediatamente na grade
  const sameGroup=TURMAS_FIXAS.filter(x=>x.nome===nome&&x.dia===dia);
  const t=sameGroup[instancia];
  if(t){t.sala=sala;t.pl=pl;t.unidade=unidade;}
  renderGrade();renderGradeMini();
  // Salvar no GitHub em background
  await saveSalaOverrides();
}
function confirmarTurma(nome,dia,sala,unidade){
  // Marcar empresas desta turma como confirmadas
  entradas.forEach(en=>en.empresas.forEach(emp=>{
    if(emp.turma&&'Turma '+emp.turma===nome&&emp.dia===dia&&emp.sala===sala&&(emp.unidade||'Freguesia do Ó')===(unidade||'Freguesia do Ó')){
      emp.status='Confirmado';
    }
  }));
  renderGrade();renderGradeMini();renderEmpresas();
}

async function splitTurma(nome,dia,instancia){
  const t=TURMAS_FIXAS.filter(x=>x.nome===nome&&x.dia===dia)[instancia];
  if(!t)return;
  const total=t.jovens;
  const j1=prompt(`${nome} tem ${total} jovens no total.
Quantos ficam na Sala 1 (Manu)?`);
  if(!j1)return;
  const n1=parseInt(j1);
  if(isNaN(n1)||n1<=0||n1>=total){alert('Número inválido');return;}
  const n2=total-n1;
  const salas=(unidades.find(u=>u.nome===(t.unidade||'Freguesia do Ó'))||{salas:['Sala 1','Sala 2']}).salas;
  const chave=nome+'|'+dia+'|'+instancia;
  salaOverrides[chave]={split:[
    {sala:salas[0],pl:'Manu',jovens:n1,unidade:t.unidade||'Freguesia do Ó'},
    {sala:salas[1],pl:'Carol',jovens:n2,unidade:t.unidade||'Freguesia do Ó'}
  ]};
  await saveSalaOverrides();
  carregarDoDirectus();
}

function filtrar(f){
  filtroAtivo=f;
  ['todos','Em aberto','Confirmado','Adiado'].forEach(s=>{
    const id='f-'+(s==='todos'?'todos':s==='Em aberto'?'emaberto':s==='Confirmado'?'conf':'adiado');
    const el=document.getElementById(id);
    if(!el)return;
    el.style.background=s===f?'var(--blue)':'';
    el.style.color=s===f?'#fff':'';
    el.style.borderColor=s===f?'var(--blue)':'';
  });
  renderEmpresas();
}

function toggleEC(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'';}

// ── CRUD ENTRADAS/EMPRESAS ──
function excluirEntrada(eid){
  if(!confirm('Excluir esta entrada e todas as empresas?'))return;
  entradas=entradas.filter(e=>e.id!==eid);
  renderEmpresas();renderGradeMini();
}
function excluirEmp(eid,empid){
  if(!confirm('Excluir esta empresa?'))return;
  const e=entradas.find(x=>x.id===eid);if(!e)return;
  e.empresas=e.empresas.filter(x=>x.id!==empid);
  renderEmpresas();renderGradeMini();
}
function adicionarEmp(eid){
  const e=entradas.find(x=>x.id===eid);if(!e)return;
  e.empresas.push({id:'emp'+Date.now(),nome:'Nova empresa',jovens:1,status:'Em aberto',turma:null,dia:null,sala:null,unidade:null});
  renderEmpresas();renderGradeMini();
}
function updNome(eid,empid,val){const e=entradas.find(x=>x.id===eid);const emp=e?.empresas.find(x=>x.id===empid);if(emp)emp.nome=val.trim()||emp.nome;}
function updJovens(eid,empid,val){
  const e=entradas.find(x=>x.id===eid);const emp=e?.empresas.find(x=>x.id===empid);
  if(emp){emp.jovens=parseInt(val)||0;renderGradeMini();}
}
function updStatus(eid,empid,val){
  const e=entradas.find(x=>x.id===eid);const emp=e?.empresas.find(x=>x.id===empid);
  if(!emp)return;
  const antigo=emp.status;
  emp.status=val;
  if(val==='Adiado'){
    // Perguntar para qual data vai
    const novaData=prompt(`Para qual data foi adiado ${emp.nome}? (AAAA-MM-DD, ou Enter para deixar sem data):`);
    if(novaData&&/^\d{4}-\d{2}-\d{2}$/.test(novaData)){
      // Mover para entrada da nova data
      const entradaDest=entradas.find(x=>x.data===novaData);
      if(entradaDest){
        emp.status='Em aberto';
        emp.turma=null;emp.dia=null;emp.sala=null;emp.unidade=null;
        e.empresas=e.empresas.filter(x=>x.id!==empid);
        entradaDest.empresas.push({...emp,id:'emp'+Date.now(),status:'Em aberto'});
        alert(`${emp.nome} movido para entrada de ${fmtData(novaData)}.`);
      } else {
        // Criar nova entrada
        if(confirm(`Não existe entrada para ${fmtData(novaData)}. Criar nova entrada?`)){
          const novEmp={...emp,id:'emp'+Date.now(),status:'Em aberto',turma:null,dia:null,sala:null,unidade:null};
          e.empresas=e.empresas.filter(x=>x.id!==empid);
          entradas.push({id:'e'+Date.now(),data:novaData,empresas:[novEmp]});
          entradas.sort((a,b)=>a.data.localeCompare(b.data));
          alert(`Entrada criada para ${fmtData(novaData)} com ${emp.nome}.`);
        } else {emp.status=antigo;}
      }
    } else {emp.turma=null;emp.dia=null;emp.sala=null;emp.unidade=null;}
  }
  renderEmpresas();renderGradeMini();
}

function toggleNovaEntrada(){
  const f=document.getElementById('form-nova-entrada');
  if(!f)return;
  const showing=f.style.display!=='none';

function atualizarCtr(total,maxSala,inputId){
  const inp=document.getElementById(inputId);
  if(inp&&parseInt(inp.value)>maxSala)inp.value=maxSala;

  document.querySelectorAll('[id^="qtd-"]').forEach(i=>{soma+=parseInt(i.value)||0;});
  const rest=total-soma;
  const el=document.getElementById('restante-ctr');
  if(el){el.textContent=rest+'j';el.style.color=rest<0?'#fc5959':rest===0?'#35dcb2':'var(--blue)';}
}

function confirmarAlocacao(){
  const entrada=entradas.find(e=>e.id===_moverEid);
  const emp=entrada?.empresas.find(x=>x.id===_moverEmpid);
  if(!emp)return;
  const alocs=[];
  DIAS.forEach(dia=>{unidades.forEach(u=>{u.salas.forEach(sala=>{
    const id=`qtd-${dia}-${sala.replace(/ /g,'-')}-${u.nome.replace(/ /g,'-')}`;
    const inp=document.getElementById(id);
    if(inp&&parseInt(inp.value)>0)alocs.push({dia,sala,unidade:u.nome,jovens:parseInt(inp.value)});
  });});});
  if(!alocs.length){alert('Preencha a quantidade em pelo menos uma sala.');return;}
  const total=alocs.reduce((s,a)=>s+a.jovens,0);
  if(total>emp.jovens){alert(`Total (${total}j) excede os jovens da empresa (${emp.jovens}j).`);return;}
  if(total<emp.jovens){alert(`Você precisa alocar todos os ${emp.jovens}j de ${emp.nome}. Faltam ${emp.jovens-total}j. Distribua entre as salas disponíveis.`);return;}

  if(alocs.length===1){
    _alocar(emp,entrada,alocs[0].dia,alocs[0].sala,alocs[0].unidade,emp.jovens);
  } else {
    const idx=entrada.empresas.findIndex(x=>x.id===emp.id);
    const novas=alocs.map((a,i)=>({id:'emp'+Date.now()+i,nome:emp.nome,jovens:a.jovens,status:emp.status,turma:null,dia:null,sala:null,unidade:null}));
    entrada.empresas.splice(idx,1,...novas);
    novas.forEach((nova,i)=>_alocar(nova,entrada,alocs[i].dia,alocs[i].sala,alocs[i].unidade,alocs[i].jovens));
  }
  fecharModal();renderGrade();renderGradeMini();renderEmpresas();
}

function _alocar(emp,entrada,dia,sala,unidade,jovens){
  emp.unidade=unidade;emp.sala=sala;emp.dia=dia;
  const letra=LETRA[dia]||'A';
  // Turma existente no mesmo dia/sala/unidade desta entrada
  const companheira=entrada.empresas.find(e=>e.id!==emp.id&&e.dia===dia&&e.sala===sala&&(e.unidade||'Freguesia do Ó')===unidade&&e.turma);
  if(companheira){emp.turma=companheira.turma;return;}
  // Turma simulada existente
  const simExist=turmasSim.find(t=>t.dia===dia&&t.sala===sala&&(t.unidade||'Freguesia do Ó')===unidade);
  if(simExist){emp.turma=simExist.nome.replace('Turma ','');return;}
  // Criar novo nome
  let max=0;
  // Varrer TURMAS_FIXAS (do Directus), turmasSim e entradas para achar maior número
  [...TURMAS_FIXAS,...turmasSim].forEach(t=>{
    const m=t.nome.match(new RegExp('([A-E])[MT](\\d+)'));
    if(m&&m[1]===letra)max=Math.max(max,parseInt(m[2]));
  });
  entradas.forEach(en=>en.empresas.forEach(e=>{
    if(e.turma){const m=e.turma.match(new RegExp('([A-E])[MT](\\d+)'));if(m&&m[1]===letra)max=Math.max(max,parseInt(m[2]));}
  }));
  console.log('[Aleapyo] próxima turma de',dia,'→',letra+'M'+(max+1),'(max encontrado:',max,')');
  emp.turma=letra+TURNO+(max+1);
}

// Normalizar nome do PL para o simulador

  if(!first)return null;

async function carregarDoDirectus(){
  const statusEl=document.getElementById('sync-status');
  if(statusEl){statusEl.textContent='↻ Sincronizando...';statusEl.style.color='var(--mu)';}
  try{
    // 1. Buscar turmas ativas (excluindo Ecossistema)
    const urlTurmas=`${DIRECTUS_URL}/items/Turmas?filter[Status_new][_eq]=ativa&filter[dia_de_curso][_nnull]=true&fields=id,Name,dia_de_curso,program_lead.first_name,program_lead.last_name,data_de_inicio,data_de_termino&access_token=${DIRECTUS_TOKEN}`;
    const rT=await fetch(urlTurmas);
    if(!rT.ok)throw new Error('HTTP '+rT.status);
    const dataTurmas=(await rT.json()).data||[];
    const DATA_MINIMA='2026-03-02';
    const turmasLeapy=dataTurmas.filter(t=>{
      if(!t.Name||!t.Name.startsWith('Turma ')||!t.dia_de_curso)return false;
      if(!t.data_de_inicio)return false;
      if(t.data_de_inicio.slice(0,10)<DATA_MINIMA)return false;
      // Excluir turmas teste: sufixo com letra N (ex: Turma N1, Turma BN3, Turma 3N)
      const sufixo=t.Name.slice(6); // tudo após "Turma "
      if(/N/i.test(sufixo))return false;
      // Excluir turmas ecossistema específicas
      const EXCLUIR_NOMES=['Turma CM3'];
      if(EXCLUIR_NOMES.includes(t.Name))return false;
      return true;
    });
    const turmaIdMap={};
    turmasLeapy.forEach(t=>turmaIdMap[t.id]=t);

    // 2. Buscar jovens em andamento com turma e empresa
    const urlJovens=`${DIRECTUS_URL}/items/user_apprenticeship_data?filter[Status_formacao][_eq]=em_andamento&filter[ativo][_eq]=true&fields=turma_id,empresa_id&access_token=${DIRECTUS_TOKEN}`;
    const rJ=await fetch(urlJovens);
    if(!rJ.ok)throw new Error('HTTP jovens '+rJ.status);
    const jovens=(await rJ.json()).data||[];

    // 3. Buscar nomes das empresas
    const urlEmpresas=`${DIRECTUS_URL}/items/Empresas?fields=id,Empresa&access_token=${DIRECTUS_TOKEN}`;
    const rE=await fetch(urlEmpresas);
    const empresaNomes={};
    if(rE.ok){
      const eData=(await rE.json()).data||[];
      eData.forEach(e=>{if(e.id&&e.Empresa)empresaNomes[e.id]=e.Empresa;});
    }

    // 4. Agrupar jovens por turma e empresa
    const turmaCounts={};
    const turmaEmpresas={};
    jovens.forEach(j=>{
      if(!j.turma_id||!turmaIdMap[j.turma_id])return;
      if(!turmaCounts[j.turma_id])turmaCounts[j.turma_id]=0;
      turmaCounts[j.turma_id]++;
      if(j.empresa_id){
        if(!turmaEmpresas[j.turma_id])turmaEmpresas[j.turma_id]={};
        turmaEmpresas[j.turma_id][j.empresa_id]=(turmaEmpresas[j.turma_id][j.empresa_id]||0)+1;
      }
    });

    // 4. Atualizar TURMAS_FIXAS
    const existentes=new Set(TURMAS_FIXAS.map(t=>t.nome));
    // Limpar TURMAS_FIXAS antes de re-popular (evita duplicatas em re-sync)
    TURMAS_FIXAS.length=0;
    const hoje=new Date().toISOString().slice(0,10);
    let adicionadas=0;

    // Mapear sala por turma: usar o mesmo dia para agrupar turmas e distribuir por sala
    // Estratégia: ordenar por data_de_inicio e distribuir em salas disponíveis
    // Agrupar turmas do Directus por dia para distribuir salas corretamente
    const turmasPorDia={};
    turmasLeapy.forEach(t=>{
      if(!turmaCounts[t.id])return; // sem jovens em andamento → ignorar
      const dia=DIAS_MAP[t.dia_de_curso]||t.dia_de_curso;
      if(!turmasPorDia[dia])turmasPorDia[dia]=[];
      turmasPorDia[dia].push(t);
    });

    // Popular TURMAS_FIXAS com todas as turmas ativas do Directus
    // Distribuir salas: dentro de cada dia, preencher sala 1 primeiro, depois sala 2
    Object.entries(turmasPorDia).forEach(([dia,turmasDia])=>{
      // Ordenar por data_de_inicio para consistência
      turmasDia.sort((a,b)=>(a.data_de_inicio||'').localeCompare(b.data_de_inicio||''));

      // Determinar unidade de cada turma (para simplificar, todas em Freguesia do Ó por enquanto)
      // Polo Liberdade: turmas com sufixo específico podem ser mapeadas depois manualmente
      const ocupacaoPorSala={};
      const unidades_lista=unidades.length?unidades:[{nome:'Freguesia do Ó',salas:['Sala 1','Sala 2'],capacidade:32}];

      turmasDia.forEach(t=>{
        const nomeCompleto=t.Name;
        const pl=normPL(t.program_lead?.first_name,t.program_lead?.last_name);
        const jovensCount=turmaCounts[t.id]||0;
        const empMap=turmaEmpresas[t.id]||{};
        const empresas=Object.entries(empMap).map(([eid,cnt])=>({nome:empresaNomes[eid]||`Empresa #${eid}`,jovens:cnt}));

        // Só adiciona PL se for Manu ou Carol
        if(pl&&['Manu','Carol'].includes(pl)&&!plsState.find(p=>p.nome===pl)){
          plsState.push({nome:pl,alocados:[],livres:[],simDias:[]});
          const cores={'Manu':'#35dcb2','Carol':'#f2cf6b'};
          const cor=cores[pl]||'#aaa';
          plCores[pl]={bg:cor,light:cor+'18',text:'#1d0328',border:cor};
        }

        // Encontrar unidade e sala: verificar se há turma com mesmo nome já mapeada,
        // senão distribuir pela sala menos cheia da unidade padrão
        let unidade='Freguesia do Ó';
        let sala='Sala 1';

        // Verificar se a turma tem mapeamento de unidade nas entradas existentes
        let encontrou=false;
        for(const entrada of entradas){
          for(const emp of entrada.empresas){
            if(emp.turma&&('Turma '+emp.turma)===nomeCompleto&&emp.sala&&emp.unidade){
              unidade=emp.unidade;sala=emp.sala;encontrou=true;break;
            }
          }
          if(encontrou)break;
        }

        if(!encontrou){
          // Distribuir pela sala menos ocupada dentro do dia
          const u=unidades.find(x=>x.nome===unidade)||{salas:['Sala 1','Sala 2'],capacidade:32};
          let menorOcup=9999;
          for(const s of u.salas){
            const chave=unidade+'|'+s;
            const atual=ocupacaoPorSala[chave]||0;
            if(atual<menorOcup){menorOcup=atual;sala=s;}
          }
          const chave=unidade+'|'+sala;
          ocupacaoPorSala[chave]=(ocupacaoPorSala[chave]||0)+jovensCount;
        }

        TURMAS_FIXAS.push({
          nome:nomeCompleto,
          entrada:t.data_de_inicio?t.data_de_inicio.slice(0,10):null,
          jovens:jovensCount,
          dia,sala,unidade,
          pl:pl||'—',
          status:'ativa',
          empresas,
          _do_directus:true
        });
        adicionadas++;
      });
    });

    // Aplicar overrides de sala/PL/split salvos pelo usuário
    const paraRemover=[];
    const paraAdicionar=[];
    TURMAS_FIXAS.forEach((t,i)=>{
      const sameGroup=TURMAS_FIXAS.filter(x=>x.nome===t.nome&&x.dia===t.dia);
      const instancia=sameGroup.indexOf(t);
      const chave=t.nome+'|'+t.dia+'|'+instancia;
      const ov=salaOverrides[chave];
      if(!ov)return;
      // Split: turma dividida em duas salas
      if(ov.split&&ov.split.length===2){
        paraRemover.push(t);
        ov.split.forEach(s=>paraAdicionar.push({
          ...t, sala:s.sala, pl:s.pl||t.pl, jovens:s.jovens,
          unidade:s.unidade||t.unidade, _split:true
        }));
        return;
      }
      if(ov.sala)t.sala=ov.sala;
      if(ov.pl)t.pl=ov.pl;
      if(ov.unidade)t.unidade=ov.unidade;
    });
    paraRemover.forEach(t=>{const i=TURMAS_FIXAS.indexOf(t);if(i>=0)TURMAS_FIXAS.splice(i,1);});
    paraAdicionar.forEach(t=>TURMAS_FIXAS.push(t));

    if(statusEl){
      const msg=`✓ Backoffice: ${adicionadas} turmas ativas carregadas`;
      statusEl.textContent=msg;statusEl.style.color='#0a7a60';
      setTimeout(()=>{if(statusEl)statusEl.textContent='';},5000);
    }
    renderGrade();renderGradeMini();renderEmpresas();
  }catch(e){
    console.warn('Directus indisponível:',e.message);
    if(statusEl){statusEl.textContent='⚠ Backoffice indisponível';statusEl.style.color='#856404';}
  }
}

// ── INIT ──
renderGradeMini();
renderEmpresas();
// Carregar overrides do GitHub, depois sincronizar com Directus
loadOverrides().then(()=>carregarDoDirectus());
</script>
